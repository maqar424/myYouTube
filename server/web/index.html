<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script>try{document.documentElement.dataset.theme=localStorage.getItem("myyt_theme")||"dark";}catch(e){}</script>
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <title>myYouTube</title>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>myYouTube</h1>
      <div class="theme-toggle">
        <span class="theme-label">Light</span>
        <label class="switch"><input type="checkbox" id="theme-switch" aria-label="Toggle dark mode" /><span class="slider"></span></label>
        <span class="theme-label">Dark</span>
      </div>
      <nav class="nav">
        <button id="update-btn" class="navlink plain" type="button">Update</button>
        <a class="navlink" href="/gallery.html">Gallery &rarr;</a>
      </nav>
    </div>
    <div id="storage">
      <div class="bar" id="storage-bar">
        <div class="seg cat-video" id="seg-video"></div>
        <div class="seg cat-music" id="seg-music"></div>
        <div class="seg cat-podcast" id="seg-podcast"></div>
      </div>
      <span id="storage-text">—</span>
    </div>
    <div id="storage-legend" class="legend"></div>
  </header>

  <form id="dl-form" autocomplete="off">
    <input id="url" type="url" inputmode="url" placeholder="Paste a YouTube URL…" required />
    <div class="form-row">
      <div class="segment" id="category">
        <label><input type="radio" name="category" value="video" checked /><span>Video</span></label>
        <label><input type="radio" name="category" value="music" /><span>Music</span></label>
        <label><input type="radio" name="category" value="podcast" /><span>Podcast</span></label>
      </div>
      <button type="submit">Download</button>
    </div>
  </form>

  <ul id="videos"></ul>

  <div id="playlist-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="playlist-backdrop"></div>
    <div class="dialog">
      <p class="dialog-title">This video is in a playlist</p>
      <p class="dialog-text">Download just this video, or every video in the playlist?</p>
      <div class="dialog-actions">
        <button id="pl-single" class="btn secondary" type="button">Just this video</button>
        <button id="pl-all" class="btn" type="button">Entire playlist</button>
      </div>
      <button id="pl-cancel" class="dialog-cancel" type="button">Cancel</button>
    </div>
  </div>

  <script src="/common.js"></script>
  <script src="/app.js"></script>
</body>
</html>
