<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <title>myYouTube</title>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>myYouTube</h1>
      <a class="navlink" href="/gallery.html">Gallery &rarr;</a>
    </div>
    <div id="storage">
      <div class="bar" id="storage-bar">
        <div class="seg video" id="seg-video"></div>
        <div class="seg music" id="seg-music"></div>
        <div class="seg podcast" id="seg-podcast"></div>
      </div>
      <span id="storage-text">—</span>
    </div>
    <div id="storage-legend" class="legend"></div>
  </header>

  <form id="dl-form" autocomplete="off">
    <input id="url" type="url" inputmode="url" placeholder="Paste a YouTube URL…" required />
    <div class="form-row">
      <div class="segment" id="category">
        <label><input type="radio" name="category" value="video" checked /><span>Video</span></label>
        <label><input type="radio" name="category" value="music" /><span>Music</span></label>
        <label><input type="radio" name="category" value="podcast" /><span>Podcast</span></label>
      </div>
      <button type="submit">Download</button>
    </div>
  </form>

  <ul id="videos"></ul>

  <script src="/common.js"></script>
  <script src="/app.js"></script>
</body>
</html>
