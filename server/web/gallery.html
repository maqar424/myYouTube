<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <title>Gallery — myYouTube</title>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>Gallery</h1>
      <a class="navlink" href="/">Download more</a>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-cat="video">Videos</button>
      <button class="tab" data-cat="music">Music</button>
      <button class="tab" data-cat="podcast">Podcasts</button>
    </nav>
    <div class="tabs sub-tabs hidden" id="music-modes">
      <button class="tab active" type="button" data-mode="allsongs">All Songs</button>
      <button class="tab" type="button" data-mode="playlists">Playlists</button>
      <button class="tab mode-add hidden" type="button" id="mode-add" aria-label="New playlist">+</button>
    </div>
    <input id="search" class="search" type="search" placeholder="Search…" aria-label="Search" />
  </header>

  <div id="grid" class="grid"></div>

  <!-- Video modal -->
  <div id="video-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-body">
      <button id="modal-close" class="modal-close" type="button" aria-label="Close">&#10005;</button>
      <video id="video" controls playsinline></video>
    </div>
  </div>

  <!-- Add-songs picker (playlists) -->
  <div id="addsongs-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="addsongs-backdrop"></div>
    <div class="sheet">
      <div class="sheet-head">
        <input id="addsongs-name" class="sheet-name" type="text" aria-label="Playlist name" />
        <button id="addsongs-close" class="sheet-done" type="button">Done</button>
      </div>
      <input id="addsongs-search" class="sheet-search" type="search" placeholder="Search songs…" aria-label="Search songs" />
      <div id="addsongs-list" class="addsongs-list"></div>
    </div>
  </div>

  <!-- Bottom-pinned audio player -->
  <div id="player" class="player hidden" aria-hidden="true">
    <div class="player-row1">
      <div id="player-title" class="player-title"></div>
      <button id="player-close" class="player-btn" type="button" aria-label="Close player">&#10005;</button>
    </div>
    <div class="player-row2">
      <button id="player-shuffle" class="player-btn" type="button" aria-label="Shuffle"></button>
      <button id="player-prev" class="player-btn" type="button" aria-label="Previous song"></button>
      <button id="player-toggle" class="player-btn" type="button" aria-label="Play or pause"></button>
      <button id="player-next" class="player-btn" type="button" aria-label="Next song"></button>
      <input id="player-seek" class="player-seek" type="range" min="0" max="1000" value="0" step="1" aria-label="Seek" />
      <span id="player-time" class="player-time">0:00</span>
    </div>
    <audio id="audio" preload="metadata"></audio>
  </div>

  <script src="/common.js"></script>
  <script src="/gallery.js"></script>
</body>
</html>
